name: TestFlight

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "EAS Build ID to submit (skip build step). Leave empty to build first."
        required: false
        default: ""

jobs:
  build-and-submit:
    name: Build & Submit to TestFlight
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS production
        if: ${{ github.event.inputs.build_id == '' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: |
          eas build \
            --profile production \
            --platform ios \
            --non-interactive

      - name: Inject ascAppId into eas.json
        run: |
          sed -i 's/"ios": {}/"ios": { "ascAppId": "'"$ASC_APP_ID"'" }/' eas.json
          cat eas.json
        env:
          ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
        run: |
          if [ -n "${{ github.event.inputs.build_id }}" ]; then
            BUILD_FLAG="--id ${{ github.event.inputs.build_id }}"
          else
            BUILD_FLAG="--latest"
          fi
          eas submit \
            --profile production \
            --platform ios \
            $BUILD_FLAG \
            --non-interactive

      - name: Notify Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          MSG="TestFlight build ${STATUS} - ${SHORT_SHA}"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -F "chat_id=${CHAT_ID}" \
            -F "text=${MSG}" || true
