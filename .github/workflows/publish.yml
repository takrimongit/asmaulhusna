name: Publish to Expo

on:
  push:
    branches: [main]

jobs:
  publish:
    name: EAS Update + Telegram QR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Update (preview channel)
        id: eas_update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          UPDATE_JSON=$(eas update \
            --environment preview \
            --message "CI: ${GITHUB_SHA::7}" \
            --non-interactive \
            --json)
          echo "$UPDATE_JSON"
          UPDATE_ID=$(echo "$UPDATE_JSON" | jq -r 'if type=="array" then .[0].id else .id end' 2>/dev/null || echo "unknown")
          echo "update_id=$UPDATE_ID" >> $GITHUB_OUTPUT
          echo "Published: $UPDATE_ID"

      - name: Notify Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPDATE_ID: ${{ steps.eas_update.outputs.update_id }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          EXPO_URL="exp://u.expo.dev/2fbc51fc-28b7-4e82-a34c-0c9713da18d5?channel-name=preview"
          MSG="Asma Ul Husna updated (${SHORT_SHA}) - Open in Expo Go: ${EXPO_URL}"

          RESULT=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -F "chat_id=${CHAT_ID}" \
            -F "text=${MSG}")
          echo "$RESULT" | jq -r 'if .ok then "Telegram sent OK" else "Telegram error: \(.description)" end'
